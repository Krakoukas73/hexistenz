<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DORFROMANTIK collab</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="app"></canvas>

  <script type="module" src="main.js"></script>
  
<div id="debugHud">
  <div>Hover: <span id="dbgHover">-</span></div>
  <div>Selected: <span id="dbgSelected">-</span></div>
  
  <br>
  
  <div id="btnResetCamera" class="key-button">
  RESET CAMERA
  </div>
  
  <br>
  



<div id="keyboard">
  
  
  <div class="key-row">
    <div class="key empty"></div>
    <div class="key" id="keyZ">Z</div>
    <div class="key empty"></div>
  </div>
  
  

  <div class="key-row">
    <div class="key" id="keyQ">Q</div>
    <div class="key" id="keyS">S</div>
    <div class="key" id="keyD">D</div>
  </div>


  <br>


<div class="key-row">
  <div class="key" id="keyR">R</div>
  <div class="key-label">Rotate tile</div>
</div>





  
  
</div>
	
</div>  






<div id="tileUI">
  <div class="tileBox">
    <div class="title">ACTIVE</div>
    <div id="activeTile"></div>
  </div>

  <div class="tileBox">
    <div class="title">NEXT</div>
    <div id="nextTile"></div>
  </div>
</div>
  
  
</body>
</html>
